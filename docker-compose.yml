services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:15
    container_name: fly-print-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fly_print_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-secure-password-here}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fly-print-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fly_print_cloud}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        - GOPROXY=https://goproxy.cn,direct
    container_name: fly-print-api
    environment:
      - FLY_PRINT_DATABASE_HOST=postgres
      - FLY_PRINT_DATABASE_PORT=5432
      - FLY_PRINT_DATABASE_DBNAME=${POSTGRES_DB:-fly_print_cloud}
      - FLY_PRINT_DATABASE_USER=${POSTGRES_USER:-postgres}
      - FLY_PRINT_DATABASE_PASSWORD=${POSTGRES_PASSWORD:-your-secure-password-here}
      - FLY_PRINT_SERVER_ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8012,http://127.0.0.1:8012,http://192.168.*.*,http://10.*.*.*,http://172.16.*.*,http://172.17.*.*,http://172.18.*.*,http://172.19.*.*,http://172.2*.*.*,http://172.3*.*.*}
      - FLY_PRINT_CREATE_DEFAULT_ADMIN=${CREATE_DEFAULT_ADMIN:-true}
      - FLY_PRINT_DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin123}
      - FLY_PRINT_OAUTH2_MODE=${OAUTH2_MODE:-builtin}
      - FLY_PRINT_OAUTH2_JWT_SIGNING_SECRET=${OAUTH2_JWT_SIGNING_SECRET:-change-this-to-a-random-secret-32chars}
      - FLY_PRINT_OAUTH2_JWT_TOKEN_EXPIRY=${OAUTH2_JWT_TOKEN_EXPIRY:-3600}
      - FLY_PRINT_OAUTH2_JWT_ISSUER=${OAUTH2_JWT_ISSUER:-fly-print-cloud}
      - FLY_PRINT_OAUTH2_CLIENT_ID=${OAUTH2_CLIENT_ID}
      - FLY_PRINT_OAUTH2_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET}
      - FLY_PRINT_OAUTH2_AUTH_URL=${OAUTH2_AUTH_URL}
      - FLY_PRINT_OAUTH2_TOKEN_URL=${OAUTH2_TOKEN_URL}
      - FLY_PRINT_OAUTH2_REDIRECT_URI=${OAUTH2_REDIRECT_URI:-http://localhost:8012/auth/callback}
      - FLY_PRINT_OAUTH2_USERINFO_URL=${OAUTH2_USERINFO_URL}
      - FLY_PRINT_OAUTH2_LOGOUT_URL=${OAUTH2_LOGOUT_URL}
      - FLY_PRINT_OAUTH2_LOGOUT_REDIRECT_URI_PARAM=${OAUTH2_LOGOUT_REDIRECT_URI_PARAM:-post_logout_redirect_uri}
      - FLY_PRINT_ADMIN_CONSOLE_URL=${ADMIN_CONSOLE_URL:-http://localhost:8012}
      - FLY_PRINT_STORAGE_MAX_SIZE=${STORAGE_MAX_SIZE:-10485760}
      - FLY_PRINT_SECURITY_FILE_ACCESS_SECRET=${FILE_ACCESS_SECRET:-change-this-to-a-random-secret-32chars}
      - FLY_PRINT_SECURITY_UPLOAD_TOKEN_TTL=${UPLOAD_TOKEN_TTL:-300}
      - FLY_PRINT_SECURITY_DOWNLOAD_TOKEN_TTL=${DOWNLOAD_TOKEN_TTL:-300}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - file_uploads:/root/uploads
    networks:
      - fly-print-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  admin-console-builder:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE_PATH=${REACT_APP_API_BASE_PATH:-}
        - REACT_APP_AUTH_BASE_PATH=${REACT_APP_AUTH_BASE_PATH:-}
        - REACT_APP_API_URL=${REACT_APP_API_URL:-}
    container_name: fly-print-admin-builder
    volumes:
      - admin_build:/app/build
    restart: "no"
    networks:
      - fly-print-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: fly-print-nginx
    ports:
      - "${HTTP_PORT:-8012}:80"
      # - "443:443"  # Disable SSL port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # Disable SSL volumes
      - admin_build:/usr/share/nginx/html
    depends_on:
      - api
      - admin-console-builder
    networks:
      - fly-print-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
  admin_build:
  file_uploads:

networks:
  fly-print-network:
    driver: bridge
