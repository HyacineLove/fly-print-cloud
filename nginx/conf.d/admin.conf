server {
    listen 80;
    server_name localhost;

    # Docker embedded DNS. Re-resolve container hostnames periodically so
    # `compose up --build` API recreates do not leave nginx pointing at a
    # stale IP (which may now belong to another service on :8080).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security Headers (Defense in Depth)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # HTTPS is disabled, so we don't need HSTS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Use relative redirects to avoid port mapping issues
    absolute_redirect off;

    # Keep the API health endpoint outside the SPA fallback.  Load balancers
    # must receive the backend result rather than the Admin HTML document.
    # IMPORTANT: with variables in proxy_pass, do NOT put a URI path after the
    # host (e.g. avoid http://$upstream/entry). That form drops $args. Pass only
    # http://$upstream so nginx forwards the original request URI + query.
    location = /health {
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public terminal entry is rendered by the API. Keep this exact route
    # ahead of the Admin SPA fallback so QR scans never resolve to index.html.
    location = /entry {
        limit_req zone=api_limit burst=20 nodelay;

        set $api_upstream api:8080;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Self-contained third-party contract demo. The provider remains a
    # separate service and communicates with FlyPrint only through HTTP/HMAC.
    location /integration-demo/ {
        set $demo_upstream integration-demo:8080;
        rewrite ^/integration-demo/(.*)$ /$1 break;
        proxy_pass http://$demo_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 11m;
    }

    # API Routes - Proxy to backend
    location /api/ {
        # Rate Limiting (Burst=20)
        limit_req zone=api_limit burst=20 nodelay;

        set $api_upstream api:8080;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Ensure cookies are passed
        proxy_set_header Cookie $http_cookie;
    }

    # OAuth2 Auth Routes - Proxy to backend
    location /auth/ {
        # Rate Limiting for Auth
        limit_req zone=api_limit burst=5 nodelay;

        set $api_upstream api:8080;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Ensure cookies are passed
        proxy_set_header Cookie $http_cookie;
    }

    # WebSocket Support - Match actual WebSocket path
    location /api/v1/edge/ws {
        # No rate limit for WebSocket establishment? Or lenient?
        limit_req zone=api_limit burst=10 nodelay;

        set $api_upstream api:8080;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Admin Console - Static Files (Last match)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
