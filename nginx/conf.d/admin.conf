server {
    listen 80;
    server_name localhost;

    # Security Headers (Defense in Depth)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # HTTPS is disabled, so we don't need HSTS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Use relative redirects to avoid port mapping issues
    absolute_redirect off;

    # API Routes - Proxy to backend
    location /api/ {
        # Rate Limiting (Burst=20)
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Ensure cookies are passed
        proxy_set_header Cookie $http_cookie;
    }

    # OAuth2 Auth Routes - Proxy to backend
    location /auth/ {
        # Rate Limiting for Auth
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://api:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Ensure cookies are passed
        proxy_set_header Cookie $http_cookie;
    }

    # WebSocket Support - Match actual WebSocket path
    location /api/v1/edge/ws {
        # No rate limit for WebSocket establishment? Or lenient?
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://api:8080/api/v1/edge/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Admin Console - Static Files (Last match)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
