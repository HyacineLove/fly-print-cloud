# API 独立部署配置模板（仅用于在 api 目录下单独 build/run 时）
# 使用方式：复制为 config.yaml 并按需修改。Viper 会从当前工作目录、./configs、/etc/fly-print-cloud 读取 config.yaml。
# 环境变量：FLY_PRINT_* 会覆盖同名字段（如 FLY_PRINT_DATABASE_HOST）。首次创建默认管理员可用 FLY_PRINT_CREATE_DEFAULT_ADMIN=true、FLY_PRINT_DEFAULT_ADMIN_PASSWORD=xxx。
# 使用 docker-compose 一键部署时：镜像内不包含 config.yaml，由 cloud 目录的 .env + compose 的 environment 注入配置，无需本文件。
---
app:
  name: "fly-print-cloud"
  version: "0.1.0"
  environment: "development"
  debug: true

database:
  host: "127.0.0.1"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "fly_print_cloud"
  sslmode: "disable"

server:
  host: "0.0.0.0"
  port: 8080
  # CORS允许的来源列表（支持的前端域名）
  allowed_origins:
    - "https://admin.fly-print.local"
    - "https://kiosk.fly-print.local"
    - "http://localhost:3000"  # 本地开发环境
    - "http://localhost:8080"  # 本地开发环境

# OAuth2 认证配置
oauth2:
  mode: "builtin"  # "builtin" 或 "keycloak"
  jwt_signing_secret: "your-secret-key-change-in-production"
  jwt_token_expiry: 86400  # JWT Token 有效期（秒）
  jwt_issuer: "fly-print-cloud"

# 管理控制台配置
admin:
  console_url: "https://admin.fly-print.local"

# 存储配置
storage:
  upload_dir: "./uploads"
  max_size: 10485760  # 10MB (字节)
  max_document_pages: 5  # PDF/DOCX 等文档的最大页数限制

# 安全配置
security:
  file_access_secret: "your-file-access-secret-change-in-production"
  upload_token_ttl: 300    # 上传凭证有效期（秒），默认5分钟
  download_token_ttl: 300  # 下载凭证有效期（秒），默认5分钟
